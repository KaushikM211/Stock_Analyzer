name: Prediction Accuracy Check

on:
  schedule:
    # Runs every trading day at 4:30 PM IST = 11:00 AM UTC
    # After market close — fetches actual closing prices
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

jobs:
  accuracy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run accuracy check
        env:
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE:  ${{ github.workspace }}
        run: uv run python main.py --accuracy