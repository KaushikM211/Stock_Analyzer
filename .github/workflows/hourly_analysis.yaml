name: NSE Stock Analyzer

on:
  schedule:
    # All times UTC. IST = UTC + 5:30
    - cron: '55 3 * * 1-5'   # 09:25 IST — daily baseline post-market open
    - cron: '15 4 * * 1-5'   # 09:45 IST — accuracy check
    - cron: '0 5 * * 1-5'    # 10:30 IST — intraday 1
    - cron: '45 5 * * 1-5'   # 11:15 IST — intraday 2
    - cron: '30 6 * * 1-5'   # 12:00 IST — intraday 3
    - cron: '15 7 * * 1-5'   # 12:45 IST — intraday 4
    - cron: '0 8 * * 1-5'    # 13:30 IST — intraday 5
    - cron: '45 8 * * 1-5'   # 14:15 IST — intraday 6
    - cron: '30 9 * * 1-5'   # 15:00 IST — intraday 7 + EOD accuracy
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'daily'
        type: choice
        options: [daily, force, accuracy, test-email]

permissions:
  contents: write   # needed for results-cache branch push

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # Prophet on 500 stocks can take 30–40 min

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for results-cache branch ops

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install uv ─────────────────────────────────────────────────────
      - name: Install uv
        run: pip install uv

      # ── 4. Install deps via uv sync (honours uv.lock exactly) ─────────────
      - name: Install dependencies
        run: uv sync
        # NOTE: do NOT use `uv pip install -e .` — that ignores uv.lock
        # and can pull incompatible Prophet/cmdstanpy versions silently.

      # ── 5. Determine which run this is ────────────────────────────────────
      - name: Determine run mode
        id: runmode
        run: |
          # Manual dispatch override
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "label=Manual (${{ inputs.mode }})" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Schedule-based detection by explicit cron matching
          CRON_SCHEDULE="${{ github.event.schedule }}"
          echo "Triggered by cron schedule: $CRON_SCHEDULE"

          if [ "$CRON_SCHEDULE" = "55 3 * * 1-5" ]; then
            echo "mode=daily"   >> $GITHUB_OUTPUT
            echo "label=Daily 09:25 IST" >> $GITHUB_OUTPUT
          elif [ "$CRON_SCHEDULE" = "15 4 * * 1-5" ]; then
            echo "mode=accuracy" >> $GITHUB_OUTPUT
            echo "label=Accuracy 09:45 IST" >> $GITHUB_OUTPUT
          else
            # Handles all remaining scheduled slots as live intervals
            echo "mode=intraday" >> $GITHUB_OUTPUT
            echo "label=Live $(TZ='Asia/Kolkata' date +'%H:%M') IST" >> $GITHUB_OUTPUT
          fi

      # ── 6. Run the analyzer ───────────────────────────────────────────────
      - name: Run Stock Analyzer
        env:
          GMAIL_SENDER:     ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:   ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT:  ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          # FIX: NSE's Cloudflare blocks requests without a browser User-Agent.
          # nsepython uses requests under the hood — this env var is read by
          # the patched get_nifty500_tickers() in data.py.
          NSE_USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
        run: |
          MODE="${{ steps.runmode.outputs.mode }}"
          LABEL="${{ steps.runmode.outputs.label }}"
          echo "Running in mode: $MODE ($LABEL)"

          if [ "$MODE" = "daily" ]; then
            uv run python main.py --daily

          elif [ "$MODE" = "accuracy" ]; then
            uv run python main.py --accuracy

          elif [ "$MODE" = "force" ]; then
            uv run python main.py --force

          elif [ "$MODE" = "test-email" ]; then
            uv run python main.py --test-email

          else
            # intraday
            uv run python main.py --intraday "$LABEL"
          fi
