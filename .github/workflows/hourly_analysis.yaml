name: NSE Stock Analysis

on:
  schedule:
    # Mon–Fri schedule (all times IST, converted to UTC)
    # First run at 9:20 AM — market opens 9:15 AM, 5 mins of price action
    # available before accuracy check. Scan follows immediately after.
    - cron: "20 2 * * 1-5"  # 08:20 IST
    - cron: "00 3 * * 1-5"  # 09:00 IST
    - cron: "40 3 * * 1-5"  # 09:40 IST
    - cron: "20 4 * * 1-5"  # 10:20 IST
    - cron: "00 5 * * 1-5"  # 11:00 IST
    - cron: "40 5 * * 1-5"  # 11:40 IST
    - cron: "20 6 * * 1-5"  # 12:20 IST
    - cron: "00 7 * * 1-5"  # 13:00 IST
    - cron: "40 7 * * 1-5"  # 13:40 IST
    - cron: "20 8 * * 1-5"  # 14:20 IST
    - cron: "00 9 * * 1-5"  # 15:00 IST
    - cron: "30 9 * * 1-5"  # 15:30 IST

  workflow_dispatch:
    inputs:
      run_type:
        description: "Run type: daily / intraday / force / accuracy"
        required: false
        default: "force"
      run_label:
        description: "Label e.g. 'Live 10:30 IST'"
        required: false
        default: "Manual Run"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Cache CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-v1

      - name: Install CmdStan
        run: |
          uv run python -c "
          import os, cmdstanpy
          path = os.path.expanduser('~/.cmdstan')
          if not os.path.exists(path) or not os.listdir(path):
              print('Installing CmdStan...')
              cmdstanpy.install_cmdstan()
          else:
              print('CmdStan already cached — skipping install')
          "

      - name: Detect run type and label
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_type=${{ github.event.inputs.run_type }}" >> $GITHUB_OUTPUT
            echo "run_label=${{ github.event.inputs.run_label }}" >> $GITHUB_OUTPUT
            echo "is_first_run=false"                            >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%-H)
            MIN=$(date -u +%-M)
            UTC_TOTAL=$(( HOUR * 60 + MIN ))
            IST_TOTAL=$(( UTC_TOTAL + 330 ))
            IST_H=$(( IST_TOTAL / 60 % 24 ))
            IST_M=$(( IST_TOTAL % 60 ))
            if [ "$IST_M" -lt 10 ]; then
              IST_LABEL="${IST_H}:0${IST_M} IST"
            else
              IST_LABEL="${IST_H}:${IST_M} IST"
            fi

            # Detect first run of day by checking if prediction_log.csv
            # was already committed today — more reliable than clock time
            # because GitHub cron delays can be 15-60 mins on free plans
            TODAY=$(date -u +%Y-%m-%d)
            LAST_COMMIT_DATE=$(git log -1 --format="%ci" -- prediction_log.csv 2>/dev/null | cut -d' ' -f1)

            if [ "$LAST_COMMIT_DATE" != "$TODAY" ]; then
              # prediction_log.csv not yet updated today → this is the first run
              echo "run_type=daily"               >> $GITHUB_OUTPUT
              echo "run_label=Daily ${IST_LABEL}" >> $GITHUB_OUTPUT
              echo "is_first_run=true"            >> $GITHUB_OUTPUT
            else
              echo "run_type=intraday"             >> $GITHUB_OUTPUT
              echo "run_label=Live ${IST_LABEL}"   >> $GITHUB_OUTPUT
              echo "is_first_run=false"            >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run accuracy check
        # Runs BEFORE the scan on the 9:20 AM job only.
        # Market has been open ~5 mins — day Low is already forming.
        # Validates yesterday's predictions for today against today's intraday Low.
        # You still have the full trading day ahead to act on the signal.
        if: ${{ steps.detect.outputs.is_first_run == 'true' }}
        env:
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE:  ${{ github.workspace }}
          SCAN_RESULTS_DIR:  /tmp/scan_results
        run: uv run python main.py --accuracy

      - name: Run stock analyzer
        env:
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE:  ${{ github.workspace }}
          SCAN_RESULTS_DIR:  /tmp/scan_results
        run: |
          RUN_TYPE="${{ steps.detect.outputs.run_type }}"
          RUN_LABEL="${{ steps.detect.outputs.run_label }}"

          if [ "$RUN_TYPE" = "force" ]; then
            uv run python main.py --force
          elif [ "$RUN_TYPE" = "daily" ]; then
            uv run python main.py --daily
          elif [ "$RUN_TYPE" = "accuracy" ]; then
            uv run python main.py --accuracy
          else
            uv run python main.py --intraday "$RUN_LABEL"
          fi
