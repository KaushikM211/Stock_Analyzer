name: Monthly Stock Analysis

on:
  schedule:
    - cron: "0 4 1 * *"
    - cron: "0 4 2 * *"
    - cron: "0 4 3 * *"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run stock analyzer
        env:
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: uv run python main.py --force
