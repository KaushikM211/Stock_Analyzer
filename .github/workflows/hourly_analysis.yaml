name: NSE Stock Analysis

on:
  schedule:
    # Runs every 45 mins, Mon–Fri, 9:00 AM – 3:00 PM IST
    # = 3:30 AM – 9:30 AM UTC
    # main.py checks if NSE is open — exits cleanly if holiday/closed
    - cron: "30 3 * * 1-5"  # 09:00 IST
    - cron: "15 4 * * 1-5"  # 09:45 IST
    - cron: "0 5 * * 1-5"   # 10:30 IST
    - cron: "45 5 * * 1-5"  # 11:15 IST
    - cron: "30 6 * * 1-5"  # 12:00 IST
    - cron: "15 7 * * 1-5"  # 12:45 IST
    - cron: "0 8 * * 1-5"   # 13:30 IST
    - cron: "45 8 * * 1-5"  # 14:15 IST
    - cron: "30 9 * * 1-5"  # 15:00 IST

  workflow_dispatch:
    inputs:
      run_type:
        description: "Run type: daily / intraday / force"
        required: false
        default: "force"
      run_label:
        description: "Label e.g. 'Live 10:30 IST'"
        required: false
        default: "Manual Run"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Cache CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-v1

      - name: Install CmdStan
        run: |
          uv run python -c "
          import os, cmdstanpy
          path = os.path.expanduser('~/.cmdstan')
          if not os.path.exists(path) or not os.listdir(path):
              print('Installing CmdStan...')
              cmdstanpy.install_cmdstan()
          else:
              print('CmdStan already cached — skipping install')
          "

      - name: Detect run type and label
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_type=${{ github.event.inputs.run_type }}" >> $GITHUB_OUTPUT
            echo "run_label=${{ github.event.inputs.run_label }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%-H)
            MIN=$(date -u +%-M)
            UTC_TOTAL=$(( HOUR * 60 + MIN ))
            IST_TOTAL=$(( UTC_TOTAL + 330 ))
            IST_H=$(( IST_TOTAL / 60 % 24 ))
            IST_M=$(( IST_TOTAL % 60 ))
            if [ "$IST_M" -lt 10 ]; then
              IST_LABEL="${IST_H}:0${IST_M} IST"
            else
              IST_LABEL="${IST_H}:${IST_M} IST"
            fi
            # 9:00 AM IST = UTC 210 mins → first run of day
            if [ "$UTC_TOTAL" -le "210" ]; then
              echo "run_type=daily"              >> $GITHUB_OUTPUT
              echo "run_label=Daily ${IST_LABEL}" >> $GITHUB_OUTPUT
            else
              echo "run_type=intraday"            >> $GITHUB_OUTPUT
              echo "run_label=Live ${IST_LABEL}"  >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run stock analyzer
        env:
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE:  ${{ github.workspace }}
          SCAN_RESULTS_DIR:  /tmp/scan_results
        run: |
          RUN_TYPE="${{ steps.detect.outputs.run_type }}"
          RUN_LABEL="${{ steps.detect.outputs.run_label }}"

          if [ "$RUN_TYPE" = "force" ]; then
            uv run python main.py --force
          elif [ "$RUN_TYPE" = "daily" ]; then
            uv run python main.py --daily
          else
            uv run python main.py --intraday "$RUN_LABEL"
          fi

      - name: Run accuracy check
        if: ${{ always() }}
        env:
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:    ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT:   ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE:  ${{ github.workspace }}
          SCAN_RESULTS_DIR:  /tmp/scan_results
        run: uv run python main.py --accuracy
