name: NSE Stock Analysis

on:
  schedule:
    # ── Every 30 mins during market hours, Mon–Fri ──
    # Market hours: 9:00 AM – 3:30 PM IST = 3:30 AM – 10:00 AM UTC
    # Run every 30 mins = 13 runs per day
    # Run 1 at 9:00 AM IST = 3:30 AM UTC (baseline / monthly email)
    - cron: "30 3 * * 1-5"
    - cron: "0 4 * * 1-5"
    - cron: "30 4 * * 1-5"
    - cron: "0 5 * * 1-5"
    - cron: "30 5 * * 1-5"
    - cron: "0 6 * * 1-5"
    - cron: "30 6 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "30 7 * * 1-5"
    - cron: "0 8 * * 1-5"
    - cron: "30 8 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "30 9 * * 1-5"

  workflow_dispatch:
    inputs:
      run_type:
        description: "Run type: daily / intraday / force"
        required: false
        default: "force"
      run_label:
        description: "Label e.g. 'Live-1 10:30'"
        required: false
        default: "Manual Run"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      run_type:  ${{ steps.detect.outputs.run_type }}
      run_label: ${{ steps.detect.outputs.run_label }}
    steps:
      - name: Detect run type from cron time
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_type=${{ github.event.inputs.run_type }}" >> $GITHUB_OUTPUT
            echo "run_label=${{ github.event.inputs.run_label }}" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          TIME=$(printf "%02d%02d" $HOUR $MIN)
          # Convert UTC to IST label (UTC + 5:30)
          IST_MINS=$(( 10#$HOUR * 60 + 10#$MIN + 330 ))
          IST_H=$(( IST_MINS / 60 % 24 ))
          IST_M=$(( IST_MINS % 60 ))
          IST_LABEL=$(printf "%02d:%02d IST" $IST_H $IST_M)

          if [ "$TIME" -le "0345" ]; then
            echo "run_type=daily"    >> $GITHUB_OUTPUT
            echo "run_label=Pre-Market 09:00 IST" >> $GITHUB_OUTPUT
          else
            echo "run_type=intraday" >> $GITHUB_OUTPUT
            echo "run_label=Live $IST_LABEL" >> $GITHUB_OUTPUT
          fi

  analyze:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write    # needed to push to results-cache branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Cache CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-v1

      - name: Install CmdStan
        run: |
          uv run python -c "
          import os, cmdstanpy
          path = os.path.expanduser('~/.cmdstan')
          if not os.path.exists(path) or not os.listdir(path):
              print('Installing CmdStan...')
              cmdstanpy.install_cmdstan()
          else:
              print('CmdStan already cached — skipping install')
          "

      - name: Run stock analyzer
        env:
          GMAIL_SENDER:     ${{ secrets.GMAIL_SENDER }}
          GMAIL_PASSWORD:   ${{ secrets.GMAIL_PASSWORD }}
          GMAIL_RECIPIENT:  ${{ secrets.GMAIL_RECIPIENT }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          SCAN_RESULTS_DIR: /tmp/scan_results
        run: |
          RUN_TYPE="${{ needs.setup.outputs.run_type }}"
          RUN_LABEL="${{ needs.setup.outputs.run_label }}"

          if [ "$RUN_TYPE" = "force" ]; then
            uv run python main.py --force
          elif [ "$RUN_TYPE" = "daily" ]; then
            uv run python main.py --daily
          else
            uv run python main.py --intraday "$RUN_LABEL"
          fi